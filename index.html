<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVault — Microservice Cost Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E50914;
    --red-dim: #C1060F;
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --bg4: #222222;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --green: #2ecc71;
    --yellow: #f1c40f;
    --orange: #e67e22;
    --blue: #3498db;
    --purple: #9b59b6;
    --teal: #1abc9c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  code, .mono { font-family: 'JetBrains Mono', monospace; }

  /* NAV */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 56px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; }
  .nav-logo {
    width: 28px; height: 28px;
    background: var(--red);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: #fff;
    letter-spacing: -0.5px;
  }
  .nav-title { font-size: 15px; font-weight: 500; letter-spacing: -0.3px; }
  .nav-subtitle { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .nav-right { display: flex; align-items: center; gap: 1.5rem; }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    color: var(--green);
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .nav-time { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text3); }

  /* LAYOUT */
  .layout { display: flex; height: calc(100vh - 56px); overflow: hidden; }
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 1rem 0;
  }
  .sidebar-section { padding: 0 1rem; margin-bottom: 1.5rem; }
  .sidebar-label {
    font-size: 10px; font-weight: 500; letter-spacing: 1px;
    color: var(--text3); text-transform: uppercase;
    margin-bottom: 0.5rem; padding: 0 0.25rem;
  }
  .sidebar-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.45rem 0.5rem; border-radius: 6px;
    cursor: pointer; transition: background 0.15s;
    font-size: 13px; color: var(--text2);
    margin-bottom: 2px;
  }
  .sidebar-item:hover { background: var(--bg3); color: var(--text); }
  .sidebar-item.active { background: rgba(229,9,20,0.12); color: var(--red); }
  .sidebar-item-left { display: flex; align-items: center; gap: 8px; }
  .svc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .badge {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    background: var(--bg4); padding: 1px 6px; border-radius: 3px;
    color: var(--text3);
  }
  .badge.warn { background: rgba(241,196,15,0.15); color: var(--yellow); }
  .badge.danger { background: rgba(229,9,20,0.15); color: #ff6b6b; }
  .badge.ok { background: rgba(46,204,113,0.12); color: var(--green); }

  /* MAIN */
  .main { flex: 1; overflow-y: auto; padding: 1.5rem; background: var(--bg); }

  /* HEADER ROW */
  .page-header { margin-bottom: 1.5rem; }
  .page-header h1 { font-size: 20px; font-weight: 500; letter-spacing: -0.5px; margin-bottom: 4px; }
  .page-header p { font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .page-controls { display: flex; align-items: center; gap: 0.75rem; margin-top: 1rem; }
  .ctrl-btn {
    padding: 5px 14px; border-radius: 5px; font-size: 12px;
    border: 1px solid var(--border2); background: var(--bg3);
    color: var(--text2); cursor: pointer; transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace;
  }
  .ctrl-btn:hover { background: var(--bg4); color: var(--text); }
  .ctrl-btn.active { border-color: var(--red); color: var(--red); background: rgba(229,9,20,0.08); }

  /* STAT CARDS */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.1rem 1.2rem;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .stat-card.red::before { background: var(--red); }
  .stat-card.green::before { background: var(--green); }
  .stat-card.yellow::before { background: var(--yellow); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 26px; font-weight: 300; letter-spacing: -1px; margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; }
  .stat-meta { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
  .stat-delta { font-size: 11px; font-family: 'JetBrains Mono', monospace; }
  .delta-up { color: #ff6b6b; }
  .delta-down { color: var(--green); }

  /* GRID PANELS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .panel {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.2rem;
  }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .panel-title { font-size: 13px; font-weight: 500; }
  .panel-sub { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }

  /* SERVICE TABLE */
  .svc-table { width: 100%; border-collapse: collapse; }
  .svc-table th {
    font-size: 10px; color: var(--text3); text-transform: uppercase;
    letter-spacing: 0.5px; font-weight: 500;
    text-align: left; padding: 0 0.5rem 0.6rem;
    border-bottom: 1px solid var(--border);
  }
  .svc-table th:not(:first-child) { text-align: right; }
  .svc-table td {
    padding: 0.55rem 0.5rem; font-size: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .svc-table td:not(:first-child) { text-align: right; font-family: 'JetBrains Mono', monospace; }
  .svc-table tr:last-child td { border-bottom: none; }
  .svc-table tr:hover td { background: var(--bg3); }
  .svc-name { display: flex; align-items: center; gap: 8px; }
  .svc-name span { color: var(--text2); }
  .health-bar { width: 60px; height: 4px; background: var(--bg4); border-radius: 2px; display: inline-block; position: relative; vertical-align: middle; }
  .health-bar-fill { height: 100%; border-radius: 2px; }
  .cost-spark { width: 60px; height: 24px; display: inline-block; vertical-align: middle; }

  /* ANOMALY FEED */
  .anomaly-feed { max-height: 280px; overflow-y: auto; }
  .anomaly-item {
    display: flex; gap: 10px; padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .anomaly-item:last-child { border-bottom: none; }
  .anomaly-icon {
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }
  .anomaly-icon.warn { background: rgba(241,196,15,0.15); color: var(--yellow); }
  .anomaly-icon.danger { background: rgba(229,9,20,0.15); color: #ff6b6b; }
  .anomaly-icon.info { background: rgba(52,152,219,0.15); color: var(--blue); }
  .anomaly-icon.ok { background: rgba(46,204,113,0.12); color: var(--green); }
  .anomaly-msg { flex: 1; }
  .anomaly-msg strong { color: var(--text); display: block; margin-bottom: 2px; }
  .anomaly-msg span { color: var(--text3); font-family: 'JetBrains Mono', monospace; font-size: 11px; }

  /* CIRCUIT BREAKER */
  .cb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
  .cb-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.7rem;
  }
  .cb-name { font-size: 11px; color: var(--text2); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cb-state { font-size: 12px; font-weight: 500; font-family: 'JetBrains Mono', monospace; }
  .cb-state.closed { color: var(--green); }
  .cb-state.open { color: #ff6b6b; }
  .cb-state.half { color: var(--yellow); }
  .cb-rate { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

  /* OPTIMIZATION RECOMMENDATIONS */
  .reco-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .reco-item {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.75rem;
    cursor: pointer; transition: border-color 0.15s;
  }
  .reco-item:hover { border-color: var(--border2); }
  .reco-item.high { border-left: 3px solid var(--red); }
  .reco-item.med { border-left: 3px solid var(--yellow); }
  .reco-item.low { border-left: 3px solid var(--blue); }
  .reco-savings {
    font-size: 13px; font-weight: 500; font-family: 'JetBrains Mono', monospace;
    color: var(--green); white-space: nowrap;
  }
  .reco-content { flex: 1; }
  .reco-title { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
  .reco-desc { font-size: 11px; color: var(--text3); line-height: 1.4; }

  /* KAFKA TOPOLOGY */
  .kafka-flow { display: flex; align-items: center; gap: 0; overflow-x: auto; padding: 0.5rem 0; }
  .kf-node {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 8px; padding: 0.5rem 0.75rem;
    font-size: 11px; text-align: center; flex-shrink: 0;
    min-width: 90px;
  }
  .kf-node-label { color: var(--text3); font-size: 10px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .kf-node-name { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text); }
  .kf-node-rate { font-size: 10px; color: var(--teal); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .kf-arrow {
    color: var(--text3); font-size: 16px; padding: 0 4px; flex-shrink: 0;
  }

  /* TOPOLOGY MAP */
  #topoCanvas { width: 100%; height: 220px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.2rem; }
  .tab {
    padding: 0.5rem 1rem; font-size: 12px; color: var(--text3);
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.15s; font-family: 'JetBrains Mono', monospace;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--text); border-bottom-color: var(--red); }

  /* UNIT ECONOMICS */
  .ue-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
  .ue-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.8rem;
  }
  .ue-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .ue-value { font-size: 18px; font-family: 'JetBrains Mono', monospace; font-weight: 400; }
  .ue-sub { font-size: 10px; color: var(--text3); margin-top: 3px; }

  /* FORECAST */
  .forecast-bar { height: 6px; background: var(--bg4); border-radius: 3px; margin: 4px 0; overflow: hidden; }
  .forecast-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

  /* BLINKING CURSOR EFFECT on live numbers */
  @keyframes blink { 50% { opacity: 0; } }

  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; transition: opacity 0.5s;
  }
  .loading-logo {
    width: 60px; height: 60px; background: var(--red);
    border-radius: 12px; display: flex; align-items: center;
    justify-content: center; font-size: 22px; font-weight: 600;
    color: #fff; margin-bottom: 1.5rem;
  }
  .loading-bar { width: 200px; height: 2px; background: var(--bg3); border-radius: 1px; overflow: hidden; }
  .loading-bar-fill { height: 100%; background: var(--red); border-radius: 1px; animation: loadBar 1.8s ease-in-out forwards; }
  @keyframes loadBar { from { width: 0; } to { width: 100%; } }
  .loading-msg { font-size: 12px; color: var(--text3); margin-top: 1rem; font-family: 'JetBrains Mono', monospace; }

  .fade-in { animation: fadeIn 0.4s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .tooltip-wrap { position: relative; }
  .tooltip-box {
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: var(--bg4); border: 1px solid var(--border2);
    border-radius: 6px; padding: 6px 10px; font-size: 11px;
    white-space: nowrap; color: var(--text); z-index: 10;
    pointer-events: none; opacity: 0; transition: opacity 0.15s;
    font-family: 'JetBrains Mono', monospace;
  }
  .tooltip-wrap:hover .tooltip-box { opacity: 1; }
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-overlay" id="loadOverlay">
  <div class="loading-logo">SV</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  <div class="loading-msg" id="loadMsg">initializing event streams...</div>
</div>

<!-- NAV -->
<nav>
  <div class="nav-brand">
    <div class="nav-logo">SV</div>
    <div>
      <div class="nav-title">StreamVault</div>
      <div class="nav-subtitle">microservice cost intelligence</div>
    </div>
  </div>
  <div class="nav-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      <span>LIVE</span>
    </div>
    <div class="nav-time" id="navTime">--:--:--</div>
  </div>
</nav>

<!-- LAYOUT -->
<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Services</div>
      <div id="sidebarSvcs"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Views</div>
      <div class="sidebar-item active" onclick="switchView('overview')">
        <div class="sidebar-item-left"><span>Overview</span></div>
      </div>
      <div class="sidebar-item" onclick="switchView('topology')">
        <div class="sidebar-item-left"><span>Topology</span></div>
      </div>
      <div class="sidebar-item" onclick="switchView('kafka')">
        <div class="sidebar-item-left"><span>Event Streams</span></div>
      </div>
      <div class="sidebar-item" onclick="switchView('optimize')">
        <div class="sidebar-item-left"><span>Optimizer</span></div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Cluster</div>
      <div style="font-size:11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; padding: 0 0.25rem; line-height: 1.8;">
        <div>Region: <span style="color:var(--text2)">us-east-1</span></div>
        <div>Nodes: <span style="color:var(--text2)" id="nodeCount">—</span></div>
        <div>Kafka: <span style="color:var(--green)">healthy</span></div>
        <div>Cassandra: <span style="color:var(--green)">healthy</span></div>
        <div>EVCache: <span style="color:var(--green)">healthy</span></div>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main" id="mainContent">
    <!-- injected by JS -->
  </div>
</div>

<script>
// ─── DATA MODEL ───────────────────────────────────────────────────────────────
const SERVICES = [
  { id:'api-gateway',      name:'api-gateway',      color:'#E50914', cost:4820, baseline:4200, p99:42,  rps:98400,  err:0.02, instances:24, cpu:61, mem:54, circuitBreaker:'CLOSED', kafka:['member-events','playback-events'] },
  { id:'playback-svc',     name:'playback-svc',      color:'#3498db', cost:8940, baseline:7200, p99:18,  rps:210000, err:0.01, instances:48, cpu:72, mem:68, circuitBreaker:'CLOSED', kafka:['playback-events','cdn-events'] },
  { id:'recommendation',   name:'recommendation',    color:'#9b59b6', cost:12300,baseline:9800, p99:95,  rps:45000,  err:0.04, instances:32, cpu:88, mem:79, circuitBreaker:'HALF',   kafka:['member-events','ab-test-events'] },
  { id:'member-svc',       name:'member-svc',         color:'#1abc9c', cost:2140, baseline:2000, p99:12,  rps:32000,  err:0.00, instances:12, cpu:34, mem:42, circuitBreaker:'CLOSED', kafka:['member-events'] },
  { id:'billing-svc',      name:'billing-svc',        color:'#f1c40f', cost:1820, baseline:1750, p99:28,  rps:8400,   err:0.00, instances:8,  cpu:29, mem:35, circuitBreaker:'CLOSED', kafka:['billing-events'] },
  { id:'search-svc',       name:'search-svc',         color:'#e67e22', cost:3600, baseline:2900, p99:55,  rps:67000,  err:0.08, instances:20, cpu:77, mem:63, circuitBreaker:'OPEN',   kafka:['search-events','member-events'] },
  { id:'encoder-svc',      name:'encoder-svc',        color:'#e74c3c', cost:18700,baseline:14000,p99:340, rps:1200,   err:0.00, instances:64, cpu:94, mem:88, circuitBreaker:'CLOSED', kafka:['encoding-events','cdn-events'] },
  { id:'notification-svc', name:'notification-svc',  color:'#2ecc71', cost:980,  baseline:900,  p99:22,  rps:12000,  err:0.01, instances:6,  cpu:18, mem:24, circuitBreaker:'CLOSED', kafka:['member-events','push-events'] },
  { id:'drm-svc',          name:'drm-svc',            color:'#34495e', cost:2200, baseline:2100, p99:8,   rps:95000,  err:0.00, instances:16, cpu:41, mem:46, circuitBreaker:'CLOSED', kafka:['playback-events'] },
  { id:'analytics-svc',    name:'analytics-svc',      color:'#fd79a8', cost:5400, baseline:4200, p99:120, rps:340000, err:0.02, instances:28, cpu:69, mem:71, circuitBreaker:'CLOSED', kafka:['member-events','ab-test-events','encoding-events'] },

const KAFKA_TOPICS = [
  { name:'member-events',    tps:420000, lag:12,   partitions:256 },
  { name:'playback-events',  tps:1200000,lag:4,    partitions:512 },
  { name:'encoding-events',  tps:8400,   lag:340,  partitions:64  },
  { name:'cdn-events',       tps:680000, lag:8,    partitions:256 },
  { name:'billing-events',   tps:42000,  lag:2,    partitions:128 },
  { name:'search-events',    tps:94000,  lag:890,  partitions:128 },
  { name:'ab-test-events',   tps:240000, lag:18,   partitions:128 },
  { name:'push-events',      tps:38000,  lag:6,    partitions:64  },
];

const RECOMMENDATIONS = [
  { priority:'high', savings:3200, title:'encoder-svc: right-size EC2 fleet', desc:'94% CPU utilization on 64 c5.4xlarge instances suggests Graviton3 migration (c7g.4xlarge). Estimated 28% compute cost reduction at identical throughput.' },
  { priority:'high', savings:2100, title:'recommendation: resolve memory pressure', desc:'P99 at 95ms and 88% circuit breaker failure rate. EVCache hit ratio dropped to 61% — cold-start storm. Warming strategy + instance count +4 resolves within SLO.' },
  { priority:'med',  savings:1400, title:'search-svc: open circuit breaker recovery', desc:'Consumer lag 890ms on search-events topic causing backpressure. Recommended: add 4 consumers + increase fetch.min.bytes to 64KB to reduce round-trips.' },
  { priority:'med',  savings:820,  title:'analytics-svc: Iceberg table compaction', desc:'Small file problem on member-events Iceberg tables — 12,400 files averaging 2.3MB. Compaction job reducing to 128MB targets will cut S3 scan costs ~34%.' },
  { priority:'low',  savings:340,  title:'api-gateway: enable response compression', desc:'gzip/brotli on JSON responses not configured. Estimated 40% bandwidth reduction on 98K RPS → $340/mo CDN egress savings.' },
  { priority:'low',  savings:180,  title:'billing-svc: Reserved Instance coverage', desc:'billing-svc runs on 8 on-demand m5.xlarge. 1-year Reserved Instance commitment saves 38% at stable, low-variance workload pattern.' },
];

const ANOMALIES_INITIAL = [
  { type:'danger', icon:'!', msg:'encoder-svc cost spike +34%', sub:'vs 30-day baseline · aws/ec2 · 14 min ago', time: Date.now()-840000 },

// ─── RUNTIME DATA SIMULATION ─────────────────────────────────────────────────
function jitter(val, pct=0.03) { return val * (1 + (Math.random()*2-1)*pct); }

function tickData() {
  tick++;
  SERVICES.forEach(s => {
    s.rps = Math.max(0, jitter(s.rps, 0.04));
    s.cpu = Math.min(100, Math.max(5, jitter(s.cpu, 0.05)));
    s.mem = Math.min(100, Math.max(5, jitter(s.mem, 0.02)));
    s.cost = Math.max(0, jitter(s.cost, 0.01));
    s.p99 = Math.max(1, jitter(s.p99, 0.08));
    s.err = Math.max(0, jitter(s.err, 0.1));
    costHistory[s.id].push(s.cost);
    if(costHistory[s.id].length > 60) costHistory[s.id].shift();
  });
  KAFKA_TOPICS.forEach(t => { t.tps = Math.max(0, jitter(t.tps, 0.05)); t.lag = Math.max(0, jitter(t.lag, 0.08)); });
}

// ─── UTILITY ──────────────────────────────────────────────────────────────────
function fmt$(n) { return '$'+(n>=1000 ? (n/1000).toFixed(1)+'K' : Math.round(n)); }
function fmtN(n) { return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(0)+'K':Math.round(n); }
function fmtPct(n) { return n.toFixed(1)+'%'; }
function fmtMs(n) { return Math.round(n)+'ms'; }
function colorForCpu(c) { return c>85?'#ff6b6b':c>65?'#f1c40f':'#2ecc71'; }
function totalCost() { return SERVICES.reduce((a,s)=>a+s.cost,0); }
function totalRps() { return SERVICES.reduce((a,s)=>a+s.rps,0); }
function totalInstances() { return SERVICES.reduce((a,s)=>a+s.instances,0); }
function projMonthly() { return totalCost()*24*30; }

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
function sparkSVG(data, color, w=60, h=24) {
  const mn = Math.min(...data), mx = Math.max(...data);
  const range = mx-mn || 1;
  const pts = data.map((v,i) => `${(i/(data.length-1))*w},${h-((v-mn)/range)*(h-2)-1}`).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;
}

// ─── TOPOLOGY CANVAS ──────────────────────────────────────────────────────────
function drawTopology() {
  const canvas = document.getElementById('topoCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = 280;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const W = canvas.width, H = canvas.height;

  const nodes = [
    { id:'client', label:'Client', x:0.05, y:0.5, color:'#666' },
    { id:'api-gateway', label:'API Gateway', x:0.22, y:0.5, color:'#E50914' },
    { id:'playback-svc', label:'playback', x:0.45, y:0.18, color:'#3498db' },
    { id:'recommendation', label:'recommend', x:0.45, y:0.4, color:'#9b59b6' },
    { id:'search-svc', label:'search', x:0.45, y:0.62, color:'#e67e22' },
    { id:'member-svc', label:'member', x:0.45, y:0.82, color:'#1abc9c' },
    { id:'encoder-svc', label:'encoder', x:0.72, y:0.18, color:'#e74c3c' },
    { id:'drm-svc', label:'drm', x:0.72, y:0.4, color:'#34495e' },
    { id:'analytics-svc', label:'analytics', x:0.72, y:0.65, color:'#fd79a8' },
    { id:'billing-svc', label:'billing', x:0.72, y:0.85, color:'#f1c40f' },
  ];

  const edges = [
    ['client','api-gateway'],
    ['api-gateway','playback-svc'],['api-gateway','recommendation'],
    ['api-gateway','search-svc'],['api-gateway','member-svc'],
    ['playback-svc','encoder-svc'],['playback-svc','drm-svc'],
    ['recommendation','analytics-svc'],['member-svc','billing-svc'],
    ['search-svc','analytics-svc'],
  ];

  ctx.font = '10px JetBrains Mono, monospace';
  ctx.textAlign = 'center';

  edges.forEach(([a,b])=>{
    const na = nodes.find(n=>n.id===a);
    const nb = nodes.find(n=>n.id===b);
    if(!na||!nb) return;
    ctx.beginPath();
    ctx.moveTo(na.x*W, na.y*H);
    ctx.lineTo(nb.x*W, nb.y*H);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // animated packet
    const progress = ((tick*2 + edges.indexOf([a,b])*7) % 100) / 100;
    const px = na.x*W + (nb.x*W - na.x*W)*progress;
    const py = na.y*H + (nb.y*H - na.y*H)*progress;
    const svc = SERVICES.find(s=>s.id===a);
    ctx.beginPath();
    ctx.arc(px, py, 2.5, 0, Math.PI*2);
    ctx.fillStyle = svc ? svc.color : '#fff';
    ctx.fill();
  });

  nodes.forEach(n=>{
    const x = n.x*W, y = n.y*H;
    const svc = SERVICES.find(s=>s.id===n.id);
    const r = n.id==='client'?16:20;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = n.color+'33';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.strokeStyle = n.color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    if(svc && svc.circuitBreaker==='OPEN') {
      ctx.beginPath(); ctx.arc(x, y, r+4, 0, Math.PI*2);
      ctx.strokeStyle = '#ff6b6b'; ctx.lineWidth=1; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
    }
    ctx.fillStyle = '#ddd';
    ctx.font = '9px JetBrains Mono, monospace';
    ctx.fillText(n.label, x, y+r+12);
    if(svc) {
      ctx.fillStyle = colorForCpu(svc.cpu);
      ctx.fillText(Math.round(svc.cpu)+'%', x, y+4);
    }
  });
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('sidebarSvcs');
  if(!el) return;
  el.innerHTML = SERVICES.map(s=>{
    const drift = ((s.cost-s.baseline)/s.baseline*100);
    const badge = s.circuitBreaker==='OPEN'?'danger':drift>10?'warn':'ok';
    const badgeText = s.circuitBreaker==='OPEN'?'OPEN':drift>10?`+${drift.toFixed(0)}%`:'OK';
    return `<div class="sidebar-item" onclick="focusService('${s.id}')">
      <div class="sidebar-item-left">
        <div class="svc-dot" style="background:${s.color}"></div>
        <span>${s.name.replace('-svc','').replace('-','\u2011')}</span>
      </div>
      <span class="badge ${badge}">${badgeText}</span>
    </div>`;
  }).join('');
  document.getElementById('nodeCount').textContent = totalInstances();
}

// ─── RENDER & TICK ────────────────────────────────────────────────────────────
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.sidebar-item').forEach(el=>{
    if(['overview','topology','kafka','optimize'].some(x=>el.getAttribute('onclick')?.includes(x))) {
      el.classList.toggle('active', el.getAttribute('onclick')?.includes(v));
    }
  });
  render();
}

function setRange(r) { timeRange = r; render(); }
function focusService(id) { }

function render() {
  const el = document.getElementById('mainContent');
  if(currentView==='overview') el.innerHTML = renderOverview();
  else if(currentView==='topology') el.innerHTML = renderTopology();
  else if(currentView==='kafka') el.innerHTML = renderKafka();
  else if(currentView==='optimize') el.innerHTML = renderOptimize();

  setTimeout(()=>{
    if(currentView==='overview') drawTrendChart();
    if(currentView==='topology') { drawTopology(); drawLayerChart(); }
    if(currentView==='optimize') drawForecastChart();
  }, 50);
}

// ─── LIVE UPDATES ─────────────────────────────────────────────────────────────
function updateLiveNumbers() {
  const el = document.getElementById('sv-cost');
  if(el) el.textContent = fmt$(totalCost());
}

let topoAnimFrame = null;
function animateTopo() {
  if(currentView!=='topology') return;
  drawTopology();
  topoAnimFrame = requestAnimationFrame(animateTopo);
  tick++;
}

setInterval(()=>{
  tickData();
  renderSidebar();
  if(currentView==='overview') { updateLiveNumbers(); }
  if(currentView==='topology') { /* RAF handles */ }
}, 1500);

setInterval(()=>{
  if(currentView==='overview') { drawTrendChart(); }
}, 5000);

// RAF topology loop
setInterval(()=>{
  if(currentView==='topology') {
    tick++;
    drawTopology();
  }
},80);

// Clock
function updateClock() {
  const el = document.getElementById('navTime');
  if(el) el.textContent = new Date().toLocaleTimeString('en-US', {hour12:false});
}
setInterval(updateClock, 1000);

// ─── BOOT ─────────────────────────────────────────────────────────────────────
const loadMsgs = [
  'initializing event streams...',
  'connecting to kafka brokers...',
  'loading cost attribution data...',
  'calibrating anomaly detection...',
  'ready.'
];
let msgIdx = 0;
const msgEl = document.getElementById('loadMsg');
const msgInterval = setInterval(()=>{
  msgIdx++;
  if(msgIdx < loadMsgs.length && msgEl) msgEl.textContent = loadMsgs[msgIdx];
}, 360);

setTimeout(()=>{
  clearInterval(msgInterval);
  const overlay = document.getElementById('loadOverlay');
  overlay.style.opacity = '0';
  setTimeout(()=>{ overlay.style.display='none'; },500);
  render();
  renderSidebar();
  updateClock();
},1900);
</script>
</body>
